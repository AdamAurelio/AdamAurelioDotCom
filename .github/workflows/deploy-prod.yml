name: Deploy to Production (AWS S3 + CloudFront)

# Builds the static site and publishes it to S3, then invalidates CloudFront.
# Triggered on every push to main. See docs/PROD_AWS_SETUP.md and infra/README.md
# for the one-time AWS setup and the required secrets/variables.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC auth to AWS (no long-lived access keys).
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # NOTE: no `environment:` here — the deploy role's OIDC trust policy expects
    # sub = repo:...:ref:refs/heads/main (auto-deploy on merge, per README).
    # Declaring an environment would rewrite the token sub to
    # repo:...:environment:<name> and break AssumeRole. The human-approval gate
    # lives on the Infra workflow's apply job (provision role), not on deploys.
    steps:
      - uses: actions/checkout@v4

      # Fail fast (and clearly) if production infra hasn't been provisioned yet.
      # These Variables are written by the Infra workflow's apply (Terraform's
      # manage_github_actions_config). Empty == run Actions -> Infra first.
      - name: Verify infra is provisioned
        run: |
          missing=()
          [ -n "${{ vars.S3_BUCKET }}" ] || missing+=("S3_BUCKET")
          [ -n "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" ] || missing+=("CLOUDFRONT_DISTRIBUTION_ID")
          [ -n "${{ vars.AWS_DEPLOY_ROLE_ARN }}" ] || missing+=("AWS_DEPLOY_ROLE_ARN")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Production infra not provisioned — missing repo Variables: ${missing[*]}."
            echo "::error::Run Actions -> Infra (Terraform provisioning) -> Run workflow, then re-run this deploy."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync static assets to S3
        run: |
          # Long-cache the fingerprinted assets, never cache index.html.
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
