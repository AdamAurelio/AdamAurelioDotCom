name: Deploy to Production (AWS Lightsail)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/adamaurelio-backend:latest
            ghcr.io/${{ github.repository_owner }}/adamaurelio-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/adamaurelio-backend:latest
          cache-to: type=inline

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/adamaurelio-frontend:latest
            ghcr.io/${{ github.repository_owner }}/adamaurelio-frontend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/adamaurelio-frontend:latest
          cache-to: type=inline

      - name: Deploy to AWS Lightsail
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /opt/adamaurelio

            # Create backup of current deployment
            timestamp=$(date +%Y%m%d_%H%M%S)
            docker-compose -f docker-compose.prod.yml exec -T db pg_dump -U ${{ secrets.PROD_DB_USER }} ${{ secrets.PROD_DB_NAME }} > /opt/backups/backup_${timestamp}.sql

            # Create .env.prod file
            echo "${{ secrets.PROD_ENV_FILE }}" > .env.prod

            # Pull latest images
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker-compose -f docker-compose.prod.yml pull

            # Stop and remove old containers (except database)
            docker-compose -f docker-compose.prod.yml stop backend nginx
            docker-compose -f docker-compose.prod.yml rm -f backend nginx

            # Start new containers
            docker-compose -f docker-compose.prod.yml up -d

            # Wait for backend to be ready
            sleep 30

            # Run database migrations
            docker-compose -f docker-compose.prod.yml exec -T backend python manage.py migrate

            # Collect static files
            docker-compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput

            # Clean up old images (keep last 3)
            docker image prune -f

      - name: Health Check
        run: |
          sleep 30
          curl -f https://adamaurelio.com/health/ || exit 1
          curl -f https://api.adamaurelio.com/health/ || exit 1

      - name: Run smoke tests
        run: |
          curl -f https://adamaurelio.com/ || exit 1
          curl -f https://api.adamaurelio.com/api/ || exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /opt/adamaurelio
            docker-compose -f docker-compose.prod.yml down
            # Restore from backup if needed
            echo "Deployment failed. Manual rollback may be required."

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production Deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Create release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Production deployment successful
            Commit: ${{ github.sha }}
            Deployed by: ${{ github.actor }}
          draft: false
          prerelease: false
