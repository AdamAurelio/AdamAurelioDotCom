name: Deploy to Production (AWS S3 + CloudFront)

# Builds the static site and publishes it to S3, then invalidates CloudFront.
# Triggered on every push to main. See docs/PROD_AWS_SETUP.md and infra/README.md
# for the one-time AWS setup and the required secrets/variables.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC auth to AWS (no long-lived access keys).
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync static assets to S3
        run: |
          # Long-cache the fingerprinted assets, never cache index.html.
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
