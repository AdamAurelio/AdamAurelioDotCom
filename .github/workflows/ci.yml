name: CI

# Lint + build on every PR and on pushes to dev.
# Catches build breaks (including filename-casing issues, since CI runs Linux)
# before anything reaches QA or production.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      # Dependency vulnerability scan (security baseline §10.2 / OWASP A06).
      # Fails the build on high/critical advisories; lower severities are
      # surfaced but non-blocking.
      - name: Audit dependencies
        run: npm audit --audit-level=high

      # Secret scanning (security baseline §4.3) — ensures no credential is
      # ever committed, even though .env* is gitignored.
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
