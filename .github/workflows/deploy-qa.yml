name: Deploy to QA (Synology NAS)

on:
  push:
    branches: [qa]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy to QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/adamaurelio-backend:qa
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/adamaurelio-backend:qa
          cache-to: type=inline

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/adamaurelio-frontend:qa
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/adamaurelio-frontend:qa
          cache-to: type=inline

      - name: Deploy to Synology NAS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SYNOLOGY_HOST }}
          username: ${{ secrets.SYNOLOGY_USER }}
          key: ${{ secrets.SYNOLOGY_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /volume1/docker/adamaurelio-qa

            # Create .env.qa file
            echo "${{ secrets.QA_ENV_FILE }}" > .env.qa

            # Pull latest images
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker-compose -f docker-compose.qa.yml pull

            # Stop and remove old containers
            docker-compose -f docker-compose.qa.yml down

            # Start new containers
            docker-compose -f docker-compose.qa.yml up -d

            # Run database migrations
            docker-compose -f docker-compose.qa.yml exec -T backend python manage.py migrate

            # Collect static files
            docker-compose -f docker-compose.qa.yml exec -T backend python manage.py collectstatic --noinput

            # Clean up old images
            docker image prune -f

      - name: Health Check
        run: |
          sleep 30
          curl -f http://${{ secrets.SYNOLOGY_HOST }}:8001/health/ || exit 1

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'QA Deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
