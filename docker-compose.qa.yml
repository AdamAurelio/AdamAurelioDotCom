# QA environment — runs on the Synology NAS (Container Manager).
# Build + serve the static site behind nginx on port 8080.
#   docker compose -f docker-compose.qa.yml up -d --build
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: adamaurelio-web:qa
    container_name: adamaurelio_qa
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
