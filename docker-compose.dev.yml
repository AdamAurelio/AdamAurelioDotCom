# Development Docker Compose Configuration

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: adamaurelio_dev_db
    environment:
      POSTGRES_DB: ${DB_NAME:-adamaurelio_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: adamaurelio_dev_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_ENV=development
      - PYTHONUNBUFFERED=1

  # React Frontend
  frontend:
    build:
      context: ./adamaurelio
      dockerfile: Dockerfile.dev
    container_name: adamaurelio_dev_frontend
    command: npm start
    volumes:
      - ./adamaurelio:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env.dev
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_dev_data:
  backend_static:
  backend_media:

networks:
  default:
    name: adamaurelio_dev_network
