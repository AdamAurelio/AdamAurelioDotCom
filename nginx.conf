server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # These MUST match the CloudFront Response Headers Policy used in production
    # (see infra/README.md §7). QA exists to validate this exact header set
    # before it reaches the live site.
    #
    # CSP note: the app is fully self-contained (no external scripts/fonts/CDNs),
    # so script-src can stay 'self'. style-src keeps 'unsafe-inline' only because
    # inline style attributes are a negligible XSS vector and dropping it risks
    # breaking runtime-injected styles; revisit if/when that's verified unneeded.
    set $csp "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests";

    add_header Content-Security-Policy $csp always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets — cache hard.
    # (add_header here drops the inherited security headers; re-add nosniff, the
    # only one that matters for static JS/CSS responses.)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA history fallback — every unknown path serves index.html.
    # No add_header here, so the server-level security headers are inherited.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached (so new deploys are picked up).
    # add_header here drops inherited headers, so the full security set is
    # repeated — this is the HTML document that most needs CSP/anti-framing.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy $csp always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    }

    # Health check for container orchestration
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
